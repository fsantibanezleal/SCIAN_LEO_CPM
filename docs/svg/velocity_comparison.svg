<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#44ff88"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00ccff"/>
    </marker>
    <marker id="arrowYellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffcc00"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Velocity Model Comparison</text>

  <!-- Divider -->
  <line x1="400" y1="50" x2="400" y2="380" stroke="#444466" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- LEFT: Old Model -->
  <text x="200" y="70" text-anchor="middle" fill="#ff6666" font-family="Arial, sans-serif" font-size="15" font-weight="bold">v2.0: Centroid Offset (BROKEN)</text>

  <!-- Cell body -->
  <circle cx="200" cy="210" r="60" fill="none" stroke="#667788" stroke-width="2"/>

  <!-- Filopodia bumps (distributed around) -->
  <ellipse cx="200" cy="145" rx="12" ry="8" fill="none" stroke="#88aacc" stroke-width="1.5"/>
  <ellipse cx="252" cy="175" rx="8" ry="12" fill="none" stroke="#88aacc" stroke-width="1.5" transform="rotate(30,252,175)"/>
  <ellipse cx="260" cy="220" rx="8" ry="12" fill="none" stroke="#88aacc" stroke-width="1.5"/>
  <ellipse cx="240" cy="260" rx="8" ry="12" fill="none" stroke="#88aacc" stroke-width="1.5" transform="rotate(-30,240,260)"/>
  <ellipse cx="160" cy="260" rx="8" ry="12" fill="none" stroke="#88aacc" stroke-width="1.5" transform="rotate(30,160,260)"/>
  <ellipse cx="140" cy="210" rx="8" ry="12" fill="none" stroke="#88aacc" stroke-width="1.5"/>
  <ellipse cx="160" cy="170" rx="8" ry="12" fill="none" stroke="#88aacc" stroke-width="1.5" transform="rotate(-20,160,170)"/>

  <!-- Center point -->
  <circle cx="200" cy="210" r="4" fill="#ffcc00"/>
  <text x="210" y="205" fill="#ffcc00" font-family="Arial, sans-serif" font-size="10">center</text>

  <!-- Centroid point (nearly same as center) -->
  <circle cx="203" cy="208" r="4" fill="#ff4444"/>
  <text x="213" y="220" fill="#ff4444" font-family="Arial, sans-serif" font-size="10">centroid</text>

  <!-- Tiny velocity arrow (near zero) -->
  <line x1="200" y1="210" x2="206" y2="207" stroke="#ff4444" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- Label -->
  <text x="200" y="310" text-anchor="middle" fill="#ff8888" font-family="Arial, sans-serif" font-size="11">centroid ~ center</text>
  <text x="200" y="328" text-anchor="middle" fill="#ff8888" font-family="Arial, sans-serif" font-size="11">v ~ 0 (always!)</text>

  <!-- Formula -->
  <text x="200" y="360" text-anchor="middle" fill="#aaaacc" font-family="monospace" font-size="11">v = V0 * (centroid - center)</text>

  <!-- RIGHT: New Model -->
  <text x="600" y="70" text-anchor="middle" fill="#44ff88" font-family="Arial, sans-serif" font-size="15" font-weight="bold">v2.2: Filopodial Propulsion (FIXED)</text>

  <!-- Cell body -->
  <circle cx="600" cy="210" r="60" fill="none" stroke="#667788" stroke-width="2"/>

  <!-- Filopodia clustered on right side (showing asymmetry) -->
  <!-- Right-side filopodia (strong, clustered) -->
  <ellipse cx="665" cy="195" rx="8" ry="18" fill="none" stroke="#44ff88" stroke-width="2" transform="rotate(10,665,195)"/>
  <ellipse cx="660" cy="220" rx="8" ry="16" fill="none" stroke="#44ff88" stroke-width="2"/>
  <ellipse cx="655" cy="245" rx="8" ry="14" fill="none" stroke="#44ff88" stroke-width="2" transform="rotate(-15,655,245)"/>
  <ellipse cx="640" cy="170" rx="8" ry="12" fill="none" stroke="#44ff88" stroke-width="1.5" transform="rotate(35,640,170)"/>

  <!-- Left-side filopodia (weak, sparse) -->
  <ellipse cx="545" cy="215" rx="8" ry="6" fill="none" stroke="#88aacc" stroke-width="1"/>
  <ellipse cx="560" cy="260" rx="8" ry="5" fill="none" stroke="#88aacc" stroke-width="1" transform="rotate(20,560,260)"/>

  <!-- Center point -->
  <circle cx="600" cy="210" r="4" fill="#ffcc00"/>

  <!-- Individual force vectors (from center outward through filopodia) -->
  <line x1="600" y1="210" x2="660" y2="190" stroke="#44ff88" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <line x1="600" y1="210" x2="655" y2="218" stroke="#44ff88" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <line x1="600" y1="210" x2="648" y2="242" stroke="#44ff88" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <line x1="600" y1="210" x2="635" y2="168" stroke="#44ff88" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowGreen)"/>
  <line x1="600" y1="210" x2="548" y2="214" stroke="#88aacc" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="210" x2="564" y2="256" stroke="#88aacc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Net velocity vector (thick, pointing right-ish) -->
  <line x1="600" y1="210" x2="690" y2="200" stroke="#00ccff" stroke-width="3.5" marker-end="url(#arrowCyan)"/>
  <text x="680" y="188" fill="#00ccff" font-family="Arial, sans-serif" font-size="12" font-weight="bold">v_net</text>

  <!-- Labels -->
  <text x="600" y="310" text-anchor="middle" fill="#44ff88" font-family="Arial, sans-serif" font-size="11">clustered filopodia</text>
  <text x="600" y="328" text-anchor="middle" fill="#44ff88" font-family="Arial, sans-serif" font-size="11">= directed motion</text>

  <!-- Formula -->
  <text x="600" y="360" text-anchor="middle" fill="#aaaacc" font-family="monospace" font-size="11">v = V0 * Sum Aj*(cos tj, sin tj)</text>

  <!-- Legend indicators -->
  <line x1="480" y1="385" x2="500" y2="385" stroke="#44ff88" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="505" y="389" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">per-filopodium force</text>
  <line x1="630" y1="385" x2="660" y2="385" stroke="#00ccff" stroke-width="3"/>
  <text x="665" y="389" fill="#aaaaaa" font-family="Arial, sans-serif" font-size="10">net velocity</text>
</svg>