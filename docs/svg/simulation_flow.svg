<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <marker id="flowArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ecca3"/>
    </marker>
    <marker id="loopArrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f0883e"/>
    </marker>
    <linearGradient id="flowBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#e8eef4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#flowBg)" rx="6"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="17" font-weight="bold">Simulation Step Pipeline</text>
  <text x="400" y="48" text-anchor="middle" fill="#666" font-family="Arial, sans-serif" font-size="11">Each step executes these operations in sequence, then repeats</text>

  <!-- Step 1: Initialize -->
  <rect x="15" y="75" width="100" height="68" rx="8" fill="#1a1a2e" stroke="#4ecca3" stroke-width="2"/>
  <text x="65" y="100" text-anchor="middle" fill="#4ecca3" font-family="Arial, sans-serif" font-size="11" font-weight="bold">1. Initialize</text>
  <text x="65" y="118" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9">Place cells</text>
  <text x="65" y="131" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9">in grid</text>

  <!-- Arrow 1->2 -->
  <line x1="115" y1="109" x2="140" y2="109" stroke="#4ecca3" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 2: Update Angles -->
  <rect x="148" y="75" width="100" height="68" rx="8" fill="#1a1a2e" stroke="#58a6ff" stroke-width="2"/>
  <text x="198" y="98" text-anchor="middle" fill="#58a6ff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">2. Update</text>
  <text x="198" y="113" text-anchor="middle" fill="#58a6ff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Angles</text>
  <text x="198" y="131" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9">Random walk</text>

  <!-- Arrow 2->3 -->
  <line x1="248" y1="109" x2="273" y2="109" stroke="#4ecca3" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 3: Update Shape -->
  <rect x="281" y="75" width="100" height="68" rx="8" fill="#1a1a2e" stroke="#58a6ff" stroke-width="2"/>
  <text x="331" y="98" text-anchor="middle" fill="#58a6ff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">3. Update</text>
  <text x="331" y="113" text-anchor="middle" fill="#58a6ff" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Shape</text>
  <text x="331" y="131" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9">Elastic damping</text>

  <!-- Arrow 3->4 -->
  <line x1="381" y1="109" x2="406" y2="109" stroke="#4ecca3" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 4: Estimate Velocity -->
  <rect x="414" y="75" width="100" height="68" rx="8" fill="#1a1a2e" stroke="#ffd700" stroke-width="2"/>
  <text x="464" y="98" text-anchor="middle" fill="#ffd700" font-family="Arial, sans-serif" font-size="11" font-weight="bold">4. Estimate</text>
  <text x="464" y="113" text-anchor="middle" fill="#ffd700" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Velocity</text>
  <text x="464" y="131" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9">Shape asymmetry</text>

  <!-- Arrow 4->5 -->
  <line x1="514" y1="109" x2="539" y2="109" stroke="#4ecca3" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 5: Update Position -->
  <rect x="547" y="75" width="100" height="68" rx="8" fill="#1a1a2e" stroke="#ffd700" stroke-width="2"/>
  <text x="597" y="98" text-anchor="middle" fill="#ffd700" font-family="Arial, sans-serif" font-size="11" font-weight="bold">5. Update</text>
  <text x="597" y="113" text-anchor="middle" fill="#ffd700" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Position</text>
  <text x="597" y="131" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9">Euler integration</text>

  <!-- Arrow 5->6 -->
  <line x1="647" y1="109" x2="672" y2="109" stroke="#4ecca3" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 6: Resolve Collisions -->
  <rect x="680" y="75" width="100" height="68" rx="8" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
  <text x="730" y="98" text-anchor="middle" fill="#e94560" font-family="Arial, sans-serif" font-size="11" font-weight="bold">6. Resolve</text>
  <text x="730" y="113" text-anchor="middle" fill="#e94560" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Collisions</text>
  <text x="730" y="131" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9">Two-pass push</text>

  <!-- Arrow 6 down to 7 -->
  <line x1="730" y1="143" x2="730" y2="175" stroke="#4ecca3" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 7: Apply Boundaries -->
  <rect x="680" y="183" width="100" height="68" rx="8" fill="#1a1a2e" stroke="#e94560" stroke-width="2"/>
  <text x="730" y="206" text-anchor="middle" fill="#e94560" font-family="Arial, sans-serif" font-size="11" font-weight="bold">7. Apply</text>
  <text x="730" y="221" text-anchor="middle" fill="#e94560" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Boundaries</text>
  <text x="730" y="239" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9">EVL + DEB + walls</text>

  <!-- Arrow 7 left to environment update -->
  <line x1="680" y1="217" x2="515" y2="217" stroke="#4ecca3" stroke-width="2" marker-end="url(#flowArrow)"/>

  <!-- Step 8: Environment Update -->
  <rect x="415" y="183" width="100" height="68" rx="8" fill="#1a1a2e" stroke="#4ecca3" stroke-width="2"/>
  <text x="465" y="206" text-anchor="middle" fill="#4ecca3" font-family="Arial, sans-serif" font-size="11" font-weight="bold">8. Advance</text>
  <text x="465" y="221" text-anchor="middle" fill="#4ecca3" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Environment</text>
  <text x="465" y="239" text-anchor="middle" fill="#ccc" font-family="Arial, sans-serif" font-size="9">EVL/DEB migration</text>

  <!-- Arrow back to step 2 (loop) -->
  <line x1="415" y1="217" x2="280" y2="217" stroke="#f0883e" stroke-width="2"/>
  <line x1="280" y1="217" x2="280" y2="165" stroke="#f0883e" stroke-width="2"/>
  <line x1="280" y1="165" x2="198" y2="165" stroke="#f0883e" stroke-width="2"/>
  <line x1="198" y1="165" x2="198" y2="148" stroke="#f0883e" stroke-width="2" marker-end="url(#loopArrow)"/>

  <!-- Loop label -->
  <rect x="215" y="175" width="55" height="20" rx="4" fill="#f0883e" fill-opacity="0.15" stroke="#f0883e" stroke-width="1"/>
  <text x="242" y="189" text-anchor="middle" fill="#f0883e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">REPEAT</text>

  <!-- Optional proliferation branch -->
  <rect x="548" y="183" width="100" height="68" rx="8" fill="#1a1a2e" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="598" y="206" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Proliferation</text>
  <text x="598" y="221" text-anchor="middle" fill="#aaa" font-family="Arial, sans-serif" font-size="11">(optional)</text>
  <text x="598" y="239" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="9">8-stage schedule</text>

  <!-- Legend -->
  <rect x="15" y="285" width="770" height="100" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="308" text-anchor="middle" fill="#1a1a2e" font-family="Arial, sans-serif" font-size="13" font-weight="bold">Pipeline Stages</text>

  <rect x="35" y="320" width="14" height="14" rx="3" fill="none" stroke="#4ecca3" stroke-width="2"/>
  <text x="58" y="332" fill="#333" font-family="Arial, sans-serif" font-size="11">Initialization / Environment -- setup and boundary propagation</text>

  <rect x="35" y="342" width="14" height="14" rx="3" fill="none" stroke="#58a6ff" stroke-width="2"/>
  <text x="58" y="354" fill="#333" font-family="Arial, sans-serif" font-size="11">Cell Internal Dynamics -- filopodium angle changes and membrane shape relaxation</text>

  <rect x="35" y="364" width="14" height="14" rx="3" fill="none" stroke="#ffd700" stroke-width="2"/>
  <text x="58" y="376" fill="#333" font-family="Arial, sans-serif" font-size="11">Motility -- velocity estimation from asymmetry and forward Euler position update</text>

  <rect x="450" y="320" width="14" height="14" rx="3" fill="none" stroke="#e94560" stroke-width="2"/>
  <text x="473" y="332" fill="#333" font-family="Arial, sans-serif" font-size="11">Interaction -- collision resolution and boundary constraints</text>

  <rect x="450" y="342" width="14" height="14" rx="3" fill="none" stroke="#f0883e" stroke-width="2"/>
  <text x="473" y="354" fill="#333" font-family="Arial, sans-serif" font-size="11">Loop -- return to step 2 for next simulation tick</text>

  <rect x="450" y="364" width="14" height="14" rx="3" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="473" y="376" fill="#333" font-family="Arial, sans-serif" font-size="11">Optional -- proliferation only when enabled in configuration</text>
</svg>
